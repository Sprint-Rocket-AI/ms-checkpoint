# -----------------------------------------------------------------------------
# SONARQUBE CLOUD
# -----------------------------------------------------------------------------

# Debe ser el Organization Key, no el nombre visible
sonar.organization=sprint-rocket-ai

# Debe coincidir exactamente con el Project Key creado en SonarQube Cloud
sonar.projectKey=sprint-rocket-ai

# Información del proyecto
sonar.projectName=ms-checkpoint
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# -----------------------------------------------------------------------------
# CÓDIGO FUENTE
# -----------------------------------------------------------------------------

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# -----------------------------------------------------------------------------
# JACOCO
# -----------------------------------------------------------------------------

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# -----------------------------------------------------------------------------
# EXCLUSIONES DE ANÁLISIS
# -----------------------------------------------------------------------------

sonar.exclusions=\
**/*Application.java,\
**/models/**,\
**/dtos/**,\
**/enums/**,\
**/events/**
