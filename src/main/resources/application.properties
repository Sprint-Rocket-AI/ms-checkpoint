spring.application.name=ms-checkpoint
server.port=8082

# MongoDB 
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=mydatabase
spring.mongodb.username=admin
spring.mongodb.password=admin
spring.mongodb.authentication-database=admin
spring.data.mongodb.host=${spring.mongodb.host}
spring.data.mongodb.port=${spring.mongodb.port}
spring.data.mongodb.database=${spring.mongodb.database}
spring.data.mongodb.username=${spring.mongodb.username}
spring.data.mongodb.password=${spring.mongodb.password}
spring.data.mongodb.authentication-database=${spring.mongodb.authentication-database}

jira.url=${JIRA_URL}
jira.email=${JIRA_EMAIL}
jira.api-token=${JIRA_API_TOKEN}
# IA-ENGINE integration
ia-engine.base-url=http://localhost:8081/ai-engine

# Schedulers configuration
schedulers.resumen-actividades.cron=0 30 8 * * MON-FRI
schedulers.notificar-pendientes.cron=0 0 * * * *

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.cl.sprint_rocket_ai.ms_checkpoint=INFO
logging.level.org.springframework.data.mongodb=WARN

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# MCP Server
spring.ai.mcp.server.enabled=true
logging.level.org.springframework.ai=DEBUG

logging.level.org.springframework.ai.mcp=DEBUG
logging.level.io.modelcontextprotocol=DEBUG
logging.level.org.springframework.web=INFO
management.endpoints.web.exposure.include=mappings
