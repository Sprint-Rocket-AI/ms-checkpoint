spring:
  application:
    name: ms-checkpoint
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/ms_checkpoint}
      database: ms_checkpoint

server:
  port: ${SERVER_PORT:8082}

# IA-ENGINE integration
ia-engine:
  base-url: ${IA_ENGINE_URL:http://localhost:8081}
  timeout:
    connect: 5000
    read: 10000

# Schedulers configuration
schedulers:
  resumen-actividades:
    cron: "0 30 8 * * MON-FRI"
  notificar-pendientes:
    cron: "0 0 * * * *"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    cl.sprint_rocket_ai.ms_checkpoint: INFO
    org.springframework.data.mongodb: WARN
